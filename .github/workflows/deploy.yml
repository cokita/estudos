name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main        # dispara a cada push na main
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: estudo-bncc/package-lock.json

      - name: Instalar dependências
        working-directory: estudo-bncc
        run: npm ci --omit=optional

      - name: Build de produção
        working-directory: estudo-bncc
        run: npx ng build --configuration=production --base-href="/estudos/"
        # ↑ "estudos" é o nome do repositório no GitHub

      - name: Upload dos arquivos para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: estudo-bncc/dist/estudo-bncc/browser

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
